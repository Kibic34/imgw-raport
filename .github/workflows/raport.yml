# Test force scheduler
name: IMGW raport

on:
 workflow_dispatch: # ✅ tylko ręczne uruchamianie (API / cron-job)
 # zapisane: schedule: - cron: '0 6 * * *' # 8:00 Poland


jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib
          playwright install chromium

      # ✅ OAuth pliki
      - name: Create credentials file
        run: |
          cat <<EOF > credentials.json
          ${{ secrets.GOOGLE_CLIENT_SECRET }}
          EOF

      - name: Create credentials file
        run: |
          cat <<EOF > token.json
          ${{ secrets.GOOGLE_TOKEN }}
          EOF

      - name: Run script
        run: python script.py
