# Test force scheduler
name: IMGW raport v2

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib
          playwright install chromium

      # ✅ OAuth pliki
      - name: Create credentials file
        run: echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > credentials.json

      - name: Create token file
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Run script
        run: python script.py
